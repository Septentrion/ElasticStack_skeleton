# =============================================================================
#  Pipeline Logstash — Ingestion ArXiv (batch)
#  Lit les fichiers JSON lines depuis /data/arxiv-raw/ et les indexe dans ES
# =============================================================================

input {
  file {
    path => "/data/arxiv-raw/*.json"
    start_position => "beginning"
    sincedb_path => "/dev/null"
    codec => "json"
    mode => "read"
    file_completed_action => "log"
    file_completed_log_path => "/dev/null"
  }
}

filter {

  # --- Renommage des champs pour un naming propre -------------------------
  mutate {
    rename => {
      "id"          => "arxiv_id"
      "update_date" => "date_updated"
    }
    # Suppression des champs inutiles pour le TP
    remove_field => ["@version", "host", "path", "log", "event"]
  }

  # --- Parsing de la date -------------------------------------------------
  date {
    match => ["date_updated", "yyyy-MM-dd"]
    target => "date_updated"
  }

  # --- Éclatement des catégories en tableau --------------------------------
  # Le champ `categories` arrive sous forme "cs.AI cs.LG stat.ML"
  mutate {
    split => { "categories" => " " }
  }

  # --- Extraction de la catégorie primaire --------------------------------
  ruby {
    code => '
      cats = event.get("categories")
      if cats.is_a?(Array) && cats.length > 0
        event.set("primary_category", cats[0])
      end
    '
  }

  # --- Nettoyage de l'abstract (retours à la ligne superflus) -------------
  mutate {
    gsub => ["abstract", "\n", " "]
    strip => ["abstract", "title"]
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "arxiv-papers-raw"
    document_id => "%{arxiv_id}"
    action => "index"
  }

  # Décommenter pour le debug
  # stdout { codec => dots }
}
